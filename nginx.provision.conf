user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [HTTP $time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # Per-user virtual hosts — one .nginx.conf per registered user/service/label.
    # ${GENERATED_DIR} is substituted by envsubst at container startup.
    include ${GENERATED_DIR}/*.nginx.conf;
}

stream {
    log_format  stream_format  '$remote_addr - $remote_user [STREAM $time_local] '
                               '$protocol $status $bytes_sent $bytes_received '
                               '$session_time';

    access_log  /var/log/nginx/access.log  stream_format;

    sendfile        on;
    keepalive_timeout  65;

    include ${GENERATED_DIR}/*.stream.conf;
}
