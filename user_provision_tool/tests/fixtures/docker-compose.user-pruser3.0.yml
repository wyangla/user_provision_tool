# docker-compose template for "myapp" service
# Template variables:
#   myapp-user_pruser3-0-  -> e.g. myapp-user_alice-0-
#   pruser3
#   myapp
#   0
#   {'app_data': '/tmp/pytest-of-wyan2026/pytest-114/test_no_project_root_absolute_0/user_data/pruser3/myapp/0/app_data', 'db_data': '/tmp/pytest-of-wyan2026/pytest-114/test_no_project_root_absolute_0/user_data/pruser3/myapp/0/db_data', 'db_socket': '/tmp/pytest-of-wyan2026/pytest-114/test_no_project_root_absolute_0/user_data/pruser3/myapp/0/db_socket'}           -> dict: template_key -> host_path

services:
  web:
    image: nginx:alpine
    container_name: myapp-user_pruser3-0-web
    ports:
      - "0:80"
    volumes:
      - /tmp/pytest-of-wyan2026/pytest-114/test_no_project_root_absolute_0/user_data/pruser3/myapp/0/app_data:/usr/share/nginx/html:ro
    environment:
      - SERVICE_NAME=myapp
      - USER_NAME=pruser3
      - LABEL=0
    depends_on:
      - db
    networks:
      - myapp-user_pruser3-0

  db:
    image: postgres:16-alpine
    container_name: myapp-user_pruser3-0-db
    environment:
      - POSTGRES_DB=myapp_pruser3
      - POSTGRES_USER=pruser3
      - POSTGRES_PASSWORD=changeme
    volumes:
      - /tmp/pytest-of-wyan2026/pytest-114/test_no_project_root_absolute_0/user_data/pruser3/myapp/0/db_data:/var/lib/postgresql/data
      - db_socket:/var/run/postgresql
    networks:
      - myapp-user_pruser3-0

volumes:
  db_socket:

networks:
  myapp-user_pruser3-0:
    name: myapp-user_pruser3-0
