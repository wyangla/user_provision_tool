services:
  provision-api:
    build:
      context: ./user_provision_tool

    container_name: provision-api
    ports:
      - "${PROVISION_API_PORT:-8765}:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Same-path bind-mount so generated compose files reference valid host paths
      - ${PROVISION_DIR}:${PROVISION_DIR}
      # Mount letsencrypt so full-path cert references work without manual copying
      - /etc/letsencrypt:/etc/letsencrypt:ro
    environment:
      - GENERATED_DIR=${PROVISION_DIR}/generated
      - USER_DATA_DIR=${PROVISION_DIR}/user_data
      - SOURCE_PROJECTS_DIR=${PROVISION_DIR}/source_projects
      - REGISTRY_FILE=${PROVISION_DIR}/generated/user_registry.yml
      - NGINX_CONTAINER=provision-nginx
      - DOCKER_OPS_LOG=${PROVISION_DIR}/generated/docker_ops.log
      - SSL_DIR=${PROVISION_DIR}/ssl
    restart: unless-stopped

  provision-nginx:
    image: nginx:alpine
    container_name: provision-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      # Same-path bind-mount so htpasswd paths in generated confs resolve correctly
      - ${PROVISION_DIR}:${PROVISION_DIR}:ro
      - ./nginx.provision.conf:/etc/nginx/nginx.provision.conf:ro
    environment:
      - GENERATED_DIR=${PROVISION_DIR}/generated
    # envsubst substitutes only $GENERATED_DIR; all nginx $variables are left intact
    command: >
      /bin/sh -c "envsubst '$$GENERATED_DIR' < /etc/nginx/nginx.provision.conf > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"
    restart: unless-stopped
